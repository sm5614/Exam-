    let timer;
    let startTimestamp;

    function startTimer() {
        let timeLeft = examDurationMinutes * 60;
        startTimestamp = new Date();
        timer = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('time-left').textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            if (timeLeft <= 0) { clearInterval(timer); submitQuiz(); }
        }, 1000);
    }

    function loadQuiz() {
        const form = document.getElementById('quiz-form');
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'question-box';
            div.id = `q-box-${i}`;
            div.innerHTML = `<div class="question-text">${q.q}</div>`;
            const optDiv = document.createElement('div');
            optDiv.className = 'options';
            q.options.forEach((opt, oi) => {
                optDiv.innerHTML += `<label id="label-${i}-${oi}"><input type="radio" name="q${i}" value="${oi}"> ${opt}</label>`;
            });
            div.appendChild(optDiv);
            form.appendChild(div);
        });
        
        // Initial typesetting for math symbols
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        startTimer();
    }

    async function submitQuiz() {
        const name = document.getElementById('name').value.trim();
        const roll = document.getElementById('roll').value.trim();
        const district = document.getElementById('district').value.trim();

        if(!name || !roll || !district) { alert("দয়া করে নাম, রোল এবং জেলা লিখুন!"); return; }

        clearInterval(timer);
        const timeDiff = Math.floor((new Date() - startTimestamp) / 1000);
        const timeStr = `${Math.floor(timeDiff/60)} মিনিট ${timeDiff%60} সেকেন্ড`;

        let score = 0;
        let catScore = { "Bangla": 0, "English": 0, "General Math": 0, "General Knowledge": 0 };
        let catTotal = { "Bangla": 0, "English": 0, "General Math": 0, "General Knowledge": 0 };

        questions.forEach((q, i) => {
            catTotal[q.category]++;
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            document.getElementById(`label-${i}-${q.answerIndex}`).classList.add('correct-option');

            const fb = document.createElement('div');
            fb.className = 'feedback';

            if(selected) {
                if(parseInt(selected.value) === q.answerIndex) {
                    score++; catScore[q.category]++;
                    fb.innerHTML = "✅ সঠিক উত্তর।"; fb.classList.add('correct');
                } else {
                    document.getElementById(`label-${i}-${selected.value}`).classList.add('wrong-selection');
                    fb.innerHTML = `❌ ভুল উত্তর! সঠিক: ${q.options[q.answerIndex]}`; fb.classList.add('wrong');
                }
            } else {
                fb.innerHTML = `⚠️ উত্তর দেওয়া হয়নি। সঠিক: ${q.options[q.answerIndex]}`; fb.classList.add('wrong');
            }
            document.getElementById(`q-box-${i}`).appendChild(fb);
        });

        const meritVal = Math.round((score / questions.length) * 100);

        // SEND DATA TO GOOGLE SHEET
        fetch(googleSheetUrl, {
            method: "POST", mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, roll, district, score, time: timeStr, merit: meritVal + "%" })
        });

        const resBox = document.getElementById('result-box');
        resBox.style.display = 'block';
        resBox.innerHTML = `
            <h2>অভিনন্দন, পরীক্ষা শেষ!</h2>
            <p>পরীক্ষার্থী: <b>${name}</b> | রোল: <b>${roll}</b></p>
            <div class="score-circle">${score} / ${questions.length}</div>
            <p>মেরিট স্কোর: ${meritVal}% | সময় লেগেছে: ${timeStr}</p>
            <div class="cat-res">
                <b>📊 বিষয়ভিত্তিক ফলাফল:</b><br>
                বাংলা: ${catScore['Bangla']}/${catTotal['Bangla']}<br>
                ইংরেজি: ${catScore['English']}/${catTotal['English']}<br>
                সাধারণ গণিত: ${catScore['General Math']}/${catTotal['General Math']}<br>
                সাধারণ জ্ঞান: ${catScore['General Knowledge']}/${catTotal['General Knowledge']}
            </div>
        `;

        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'block';
        window.scrollTo(0,0);
        
        // Re-run MathJax for the results/feedback section
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    window.onload = loadQuiz;
</script>
