    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = seconds % 60;
        return `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function startTimer(duration) {
        let timeRemaining = duration * 60;
        startTime = new Date(); 
        timerInterval = setInterval(() => {
            timeRemaining--;
            document.getElementById('time-left').textContent = formatTime(timeRemaining);
            if (timeRemaining < 0) {
                clearInterval(timerInterval);
                document.getElementById('timer-display').style.backgroundColor = '#f0ad4e'; 
                document.getElementById('timer-message').textContent = timeUpMessage;
            }
        }, 1000);
    }

    function loadQuiz() {
        document.getElementById('quiz-header').innerHTML = `${motivationMessage} <br><span style="font-size: 0.7em;">(পরীক্ষক: ${examinerName})</span>`;
        startTimer(examDurationMinutes);
        const quizForm = document.getElementById('quiz-form');
        questions.forEach((qData, index) => {
            const qBox = document.createElement('div');
            qBox.className = 'question-box';
            qBox.id = `q-box-${index}`; 
            qBox.innerHTML = `<div class="question-text">${qData.q}</div><div class="options" id="opt-${index}"></div>`;
            quizForm.appendChild(qBox);
            qData.options.forEach((option, optIndex) => {
                const label = document.createElement('label');
                label.id = `label-${index}-${optIndex}`;
                label.innerHTML = `<input type="radio" name="question${index}" value="${optIndex}"> <span>${option}</span>`;
                document.getElementById(`opt-${index}`).appendChild(label);
            });
        });
    }

    async function submitQuiz() {
        const studentName = document.getElementById('student-name').value.trim();
        if (!studentName) {
            alert("পরীক্ষা শুরু করার আগে অবশ্যই নাম লিখতে হবে!");
            window.scrollTo(0, 0);
            return;
        }

        clearInterval(timerInterval);
        const endTime = new Date();
        const secondsTaken = Math.floor((endTime - startTime) / 1000);
        const timeTakenFormatted = formatTime(secondsTaken);

        let score = 0;
        let categoryScores = {};
        let totalCategories = {};

        questions.forEach((qData, index) => {
            categoryScores[qData.category] = (categoryScores[qData.category] || 0);
            totalCategories[qData.category] = (totalCategories[qData.category] || 0) + 1;
            
            const selected = document.querySelector(`input[name="question${index}"]:checked`);
            const qBox = document.getElementById(`q-box-${index}`);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            document.getElementById(`label-${index}-${qData.answerIndex}`).classList.add('correct-option');

            if (selected) {
                if (parseInt(selected.value) === qData.answerIndex) {
                    score++;
                    categoryScores[qData.category]++;
                    feedbackDiv.classList.add('correct');
                    feedbackDiv.textContent = '✅ সঠিক উত্তর।';
                } else {
                    selected.closest('label').classList.add('wrong-selection');
                    feedbackDiv.classList.add('wrong');
                    feedbackDiv.textContent = `❌ ভুল উত্তর। সঠিক: ${qData.options[qData.answerIndex]}`;
                }
            } else {
                feedbackDiv.classList.add('wrong');
                feedbackDiv.textContent = `⚠️ উত্তর দাওনি। সঠিক: ${qData.options[qData.answerIndex]}`;
            }
            qBox.appendChild(feedbackDiv);
            document.querySelectorAll(`input[name="question${index}"]`).forEach(r => r.disabled = true);
        });

        const percentage = Math.round((score / questions.length) * 100);
        
        // রেজাল্ট দেখানো
        const resultBox = document.getElementById('result-box');
        resultBox.style.display = 'block';
        resultBox.innerHTML = `
            <h2>অভিনন্দন ${studentName}!</h2>
            <p>আপনার স্কোর: <span class="score">${score}/${questions.length}</span> (${percentage}%)</p>
            <p>সময় লেগেছে: ${timeTakenFormatted}</p>
        `;

        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('user-info-section').style.display = 'none';
        document.getElementById('surprise-btn').style.display = 'inline-block';
        document.getElementById('restart-btn').style.display = 'inline-block';
        document.getElementById('surprise-text').textContent = feedbackTiers.find(t => percentage >= t.min && percentage <= t.max).message;

        // ডেটাবেসে পাঠানো
        const payload = {
            name: studentName,
            score: score + "/" + questions.length,
            percentage: percentage + "%",
            timeTaken: timeTakenFormatted
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        window.scrollTo(0, 0);
    }

    function openSurpriseBox() {
        document.getElementById('surprise-box').style.display = 'block';
        document.getElementById('surprise-btn').style.display = 'none';
    }

    function restartQuiz() { window.location.reload(); }
    window.onload = loadQuiz;
</script>
